<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1A64C5" />
        <stop offset="40%" stop-color="#248CC6" />
        <stop offset="100%" stop-color="#80C242" />
    </linearGradient>
    <linearGradient id="liquidGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1665C1" />
        <stop offset="40%" stop-color="#248CC6" />
        <stop offset="100%" stop-color="#80C242" />
    </linearGradient>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&amp;display=swap');
        .logotext {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 58px;
            letter-spacing: 1px;
            fill: url(#textGrad);
        }
    </style>
</defs>

<g transform="translate(10, 10)">
    <!-- Outer Arc -->
    <path d="M 17 76 
             A 42 42 0 1 1 92 50" 
          fill="none" stroke="#1665C1" stroke-width="6" stroke-linecap="round" />

    <!-- Blue Flask Left Side -->
    <path d="M 33 80 Q 23 83 26 73 L 42 40 L 42 15 L 56 15 L 56 22 L 48 22 L 48 42 L 35 70 Q 33 75 33 80 Z" 
          fill="#1665C1" />

    <!-- Green Liquid -->
    <path d="M 34 71 
             C 45 62, 60 72, 72 65
             C 78 61, 86 85, 70 92
             C 55 98, 35 90, 33 80
             Z" 
          fill="url(#liquidGrad)" />

    <!-- White Bubbles inside liquid -->
    <circle cx="50" cy="80" r="2.5" fill="#FFFFFF" opacity="0.8" />
    <circle cx="62" cy="78" r="1.5" fill="#FFFFFF" opacity="0.9" />

    <!-- Green Bubbles (floating) -->
    <circle cx="56" cy="55" r="4.5" fill="#80C242" opacity="0.9"/>
    <circle cx="68" cy="48" r="3" fill="#80C242" />
    <circle cx="78" cy="56" r="2" fill="#80C242" />
    <circle cx="42" cy="50" r="5" fill="#8CC63F" opacity="0.85"/>
    <circle cx="50" cy="38" r="3.5" fill="#8CC63F" />
    <circle cx="62" cy="32" r="2.5" fill="#8CC63F" />
    <circle cx="46" cy="30" r="2" fill="#8CC63F" opacity="0.7"/>
</g>

<!-- Text -->
<text x="125" y="82" class="logotext">WELAB</text>
</svg>
